<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оцени букет</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffeef2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #f3f3f3;
    }

    button:hover {
      background: #e6e6e6;
    }

    #thanksScreen {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <div id="ratingScreen">
    <h1>Ну давай, оцени букет 💐</h1>
    <p>Сколько из 5 он заслуживает?</p>

    <button onclick="sendRating(5,'😍 Это сильно')">😍 Это сильно</button>
    <button onclick="sendRating(4,'😏 Неплохо')">😏 Неплохо</button>
    <button onclick="sendRating(3,'😐 Норм')">😐 Норм</button>
    <button onclick="sendRating(2,'🙄 Так себе')">🙄 Так себе</button>
    <button onclick="sendRating(1,'💀 Провал')">💀 Провал</button>
  </div>

  <div id="thanksScreen">
    <h2>Принято 😎</h2>
    <p>Твой вердикт зафиксирован</p>
  </div>

</div>

<script>
  const BOT_TOKEN = "8762087875:AAHF_EWDWHnLVzm8RfeRcT6O9jDG2QrU6MY";
  const CHAT_ID = "803409577";

  let sent = false;

  function sendRating(score, label) {
    if (sent) return;
    sent = true;

    document.getElementById("ratingScreen").style.display = "none";
    document.getElementById("thanksScreen").style.display = "block";

    const text =
      "💐 Оценка букета\n\n" +
      "Оценка: " + score + "/5\n" +
      "Комментарий: " + label;

    const url =
      "https://api.telegram.org/bot" + BOT_TOKEN +
      "/sendMessage?chat_id=" + CHAT_ID +
      "&text=" + encodeURIComponent(text);

    const img = new Image();
    img.src = url;
  }
</script>

</body>
</html>
