<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оцени букет</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fdeef2;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 360px;
  background: #fff;
  padding: 24px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1, h2 {
  margin: 0 0 10px;
}

p {
  color: #666;
  margin: 0 0 12px;
  line-height: 1.4;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  background: #f5f5f5;
}

button:hover {
  background: #ececec;
}

textarea, input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  font-size: 15px;
}

#contactScreen, #thanksScreen {
  display: none;
  text-align: center;
}

.small {
  font-size: 13px;
  color: #888;
}

.choice-btn.active {
  background: #e2e2e2;
  font-weight: bold;
}

#coffeeStatus {
  font-size: 14px;
  color: #333;
  min-height: 20px;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="card">

  <div id="ratingScreen">
    <h1>Жду оценки 💐</h1>
    <p>Только честно 😏</p>

    <button type="button" onclick="sendRating(5,'😍 Это сильно')">😍 Это сильно</button>
    <button type="button" onclick="sendRating(4,'😏 Неплохо')">😏 Неплохо</button>
    <button type="button" onclick="sendRating(3,'😐 Норм')">😐 Норм</button>
    <button type="button" onclick="sendRating(2,'🙄 Так себе')">🙄 Так себе</button>
    <button type="button" onclick="sendRating(1,'💀 Это фиаско, братан')">💀 Провал</button>
  </div>

  <div id="contactScreen">
    <h2 id="reactionText"></h2>

    <p>Пусть этот букет станет началом знакомства</p>

    <div id="coffeeBlock" style="display:none;">
      <p><b>☕ Пойдём на кофе?</b></p>
      <button type="button" id="coffeeYesBtn" class="choice-btn" onclick="coffeeAnswer('Да')">Да 😏</button>
      <button type="button" id="coffeeNoBtn" class="choice-btn" onclick="coffeeAnswer('Нет')">Нет 🙃</button>
      <div id="coffeeStatus"></div>
    </div>

    <textarea id="msg" placeholder="Можешь что-нибудь написать..."></textarea>
    <input id="contact" placeholder="WhatsApp или Telegram">

    <button type="button" onclick="submitExtra()">Отправить</button>

    <div class="small">Без ответа не отпущу 😄</div>
  </div>

  <div id="thanksScreen">
    <h2 id="finalText">Принято 😎</h2>
    <p>Вердикт зафиксирован</p>
  </div>

</div>

<script>
const BOT_TOKEN = "8762087875:AAHF_EWDWHnLVzm8RfeRcT6O9jDG2QrU6MY";
const CHAT_ID = "803409577";

var sent = false;
var savedScore = "";
var savedLabel = "";
var coffeeChoice = "Не ответила";
var savedReaction = "";

function sendToTelegram(text) {
  var url = "https://api.telegram.org/bot" + BOT_TOKEN +
            "/sendMessage?chat_id=" + CHAT_ID +
            "&text=" + encodeURIComponent(text);
  var img = new Image();
  img.src = url;
}

function sendRating(score, label) {
  if (sent) return;

  savedScore = score;
  savedLabel = label;

  document.getElementById("ratingScreen").style.display = "none";

  var reaction = "";

  if (score == 5) {
    reaction = "Она в восторге 😏";
    document.getElementById("coffeeBlock").style.display = "block";
  } else if (score == 4) {
    reaction = "Неплохо 😄";
  } else if (score == 3) {
    reaction = "Норм 😐";
  } else if (score == 2) {
    reaction = "Можно лучше 😬";
  } else {
    reaction = "Ну… не зашло 💀";
  }

  savedReaction = reaction;
  document.getElementById("reactionText").innerText = reaction;

  if (score >= 4) {
    document.getElementById("contactScreen").style.display = "block";
  } else {
    sent = true;
    document.getElementById("thanksScreen").style.display = "block";

    sendToTelegram(
      "💐 Оценка: " + score + "/5 — " + label +
      "\\nРеакция: " + reaction
    );
  }
}

function coffeeAnswer(answer) {
  coffeeChoice = answer;

  var yesBtn = document.getElementById("coffeeYesBtn");
  var noBtn = document.getElementById("coffeeNoBtn");
  var status = document.getElementById("coffeeStatus");
  var msgField = document.getElementById("msg");

  yesBtn.classList.remove("active");
  noBtn.classList.remove("active");

  if (answer === "Да") {
    yesBtn.classList.add("active");
    status.innerText = "Ответ записан: Да 😏";
    msgField.value = "За такой букет можно и на кофе согласиться 😄";
  } else {
    noBtn.classList.add("active");
    status.innerText = "Ответ записан: Нет 🙃";
    msgField.value = "Букет понравился, но кофе пока пропущу 😄";
  }
}

function submitExtra() {
  if (sent) return;
  sent = true;

  var msg = document.getElementById("msg").value || "—";
  var contact = document.getElementById("contact").value || "—";

  document.getElementById("contactScreen").style.display = "none";
  document.getElementById("thanksScreen").style.display = "block";

  sendToTelegram(
    "💐 Оценка: " + savedScore + "/5 — " + savedLabel +
    "\\nРеакция: " + savedReaction +
    "\\n☕ Кофе: " + coffeeChoice +
    "\\nСообщение: " + msg +
    "\\nКонтакт: " + contact
  );
}
</script>

</body>
</html>
