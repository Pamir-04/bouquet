<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оцени букет</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fdeef2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  width:340px;
  background:#fff;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

button {
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:15px;
  cursor:pointer;
  background:#f5f5f5;
}

textarea, input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

#contactScreen, #thanksScreen {
  display:none;
  text-align:center;
}

.small {
  font-size:13px;
  color:#888;
}
</style>
</head>

<body>

<div class="card">

<div id="ratingScreen">
<h1>Жду оценки 💐</h1>
<p>Только честно 😏</p>

<button onclick="sendRating(5,'😍 Это сильно')">😍 Это сильно</button>
<button onclick="sendRating(4,'😏 Неплохо')">😏 Неплохо</button>
<button onclick="sendRating(3,'😐 Норм')">😐 Норм</button>
<button onclick="sendRating(2,'🙄 Так себе')">🙄 Так себе</button>
<button onclick="sendRating(1,'💀 Провал')">💀 Провал</button>
</div>

<div id="contactScreen">
<h2 id="reactionText"></h2>

<p>Пусть этот букет станет началом знакомства</p>

<div id="coffeeBlock" style="display:none;">
<p><b>☕ Пойдём на кофе?</b></p>
<button onclick="coffeeAnswer('Да')">Да 😏</button>
<button onclick="coffeeAnswer('Нет')">Нет 🙃</button>
</div>

<textarea id="msg" placeholder="Можешь что-нибудь написать..."></textarea>
<input id="contact" placeholder="WhatsApp или Telegram">

<button onclick="submitExtra()">Отправить</button>

<div class="small">Без ответа не отпущу 😄</div>
</div>

<div id="thanksScreen">
<h2 id="finalText">Принято 😎</h2>
<p>Вердикт зафиксирован</p>
</div>

</div>

<script>
const BOT_TOKEN = "8762087875:AAHF_EWDWHnLVzm8RfeRcT6O9jDG2QrU6MY";
const CHAT_ID = "803409577";

var sent = false;
var savedScore = "";
var savedLabel = "";
var coffeeChoice = "Не ответила";

function sendToTelegram(text) {
  var url = "https://api.telegram.org/bot" + BOT_TOKEN +
            "/sendMessage?chat_id=" + CHAT_ID +
            "&text=" + encodeURIComponent(text);
  var img = new Image();
  img.src = url;
}

function sendRating(score, label) {
  if (sent) return;

  savedScore = score;
  savedLabel = label;

  document.getElementById("ratingScreen").style.display = "none";

  let reaction = "";

  if (score == 5) {
    reaction = "Она в восторге 😏";
    document.getElementById("coffeeBlock").style.display = "block";
  }
  else if (score == 4) reaction = "Неплохо 😄";
  else if (score == 3) reaction = "Норм 😐";
  else if (score == 2) reaction = "Можно лучше 😬";
  else reaction = "Ну… не зашло 💀";

  document.getElementById("reactionText").innerText = reaction;

  if (score >= 4) {
    document.getElementById("contactScreen").style.display = "block";
  } else {
    sent = true;
    document.getElementById("thanksScreen").style.display = "block";

    sendToTelegram("💐 Оценка: " + score + "/5 — " + label);
  }
}

function coffeeAnswer(answer) {
  coffeeChoice = answer;
}

function submitExtra() {
  if (sent) return;
  sent = true;

  var msg = document.getElementById("msg").value || "—";
  var contact = document.getElementById("contact").value || "—";

  document.getElementById("contactScreen").style.display = "none";
  document.getElementById("thanksScreen").style.display = "block";

  sendToTelegram(
    "💐 Оценка: " + savedScore + "/5 — " + savedLabel +
    "\\n☕ Кофе: " + coffeeChoice +
    "\\nСообщение: " + msg +
    "\\nКонтакт: " + contact
  );
}
</script>

</body>
</html>
